<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 3D Origami Ribbon VN Monogram (White Version) -->
  
  <!-- Right leg of N (Back layer) -->
  <polygon points="70,10 90,10 90,90 70,90" fill="#777777" />
  
  <!-- Diagonal of N (Middle Back) - Weaves behind V -->
  <polygon points="10,10 30,10 90,90 70,90" fill="#aaaaaa" />
  
  <!-- Right leg of V (Middle Front) -->
  <polygon points="70,10 90,10 60,90 40,90" fill="#dddddd" />
  
  <!-- Left leg of V and N (Front layer) -->
  <polygon points="10,10 30,10 60,90 40,90" fill="#ffffff" />
</svg>
